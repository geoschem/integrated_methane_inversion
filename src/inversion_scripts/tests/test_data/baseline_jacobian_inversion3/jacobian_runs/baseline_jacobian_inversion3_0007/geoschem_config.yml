---
### geoschem_config.yml: GEOS-Chem Runtime configuration options.
### Customized for simulations using the KPP carbon mechanism.

#============================================================================
# Simulation settings
#============================================================================
simulation:
  name: carbon
  start_date: [20180505, 000000]
  end_date: [20180507, 000000]
  root_data_dir: /orcd/data/dvaron/001/IMI/ExtData
  met_field: GEOSFP
  species_database_file: ./species_database.yml
  species_metadata_output_file: OutputDir/geoschem_species_metadata.yml
  verbose:
    activate: false
    on_cores: root       # Allowed values: root all
  use_gcclassic_timers: false
  read_restart_as_real8: false

#============================================================================
# Grid settings
#============================================================================
grid:
  resolution: 0.25x0.3125
  number_of_levels: 47
  longitude:
    range: [-108.906250, -97.968750]
    center_at_180: true 
  latitude:
    range: [   25.875000, 37.125000]
    half_size_polar_boxes: true 
  nested_grid_simulation:
    activate: true 
    buffer_zone_NSEW: [3, 3, 3, 3]

#============================================================================
# Timesteps settings
#============================================================================
timesteps:
  transport_timestep_in_s: 300
  chemistry_timestep_in_s: 600

#============================================================================
# Settings for GEOS-Chem operations
#============================================================================
operations:

  chemistry:
    activate: true

  convection:
    activate: true

  pbl_mixing:
     activate: true
     use_non_local_pbl: true 

  transport:
    gcclassic_tpcore:                 # GEOS-Chem Classic only
      activate: true                  # GEOS-Chem Classic only
      fill_negative_values: true      # GEOS-Chem Classic only
      iord_jord_kord: [3, 3, 7]       # GEOS-Chem Classic only
    transported_species:
      - CH4

#============================================================================
# Options for CH4
#============================================================================
CH4_options:

  use_observational_operators:
    AIRS: false
    GOSAT: false
    TCCON: false

  analytical_inversion:
    perturb_CH4_boundary_conditions: true
    CH4_boundary_condition_ppb_increase_NSEW: [0.0, 10.0, 0.0, 0.0]

#============================================================================
# Options for CO
#============================================================================
CO_options:
  use_archived_PCO_from_CH4: true
  use_archived_PCO_from_NMVOC: true

#============================================================================
# Options for CO2
#============================================================================
CO2_options:

  sources:
    use_archived_PCO2_from_CO: true

  tagged_species:
    tag_bio_and_ocean_CO2: false
    tag_land_fossil_fuel_CO2: false

#============================================================================
# Settings for diagnostics (other than HISTORY and HEMCO)
#============================================================================
extra_diagnostics:

  obspack:
    activate: false
    quiet_logfile_output: false
    input_file: ./obspack_input_for_testing.20190701.nc
    output_file: ./OutputDir/GEOSChem.ObsPack.YYYYMMDD_hhmmz.nc4
    output_species:
      - CH4

  planeflight:
    activate: false
    flight_track_file: Planeflight.dat.YYYYMMDD
    output_file: ./OutputDir/plane.log.YYYYMMDD