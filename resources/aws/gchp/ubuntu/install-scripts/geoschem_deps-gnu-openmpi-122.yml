# This is a spack environment manifest file for
# GCHP dependencies using GNU compilers and GNU MPI.
# Preconditions: spack install gcc@12.2.0

spack:
  packages:
    all:
      target: ["x86_64"]
  specs:
    - cmake@3.30.5%gcc@12.2.0
    - udunits%gcc@12.2.0
    - libfabric@1.14.0%gcc@12.2.0 fabrics=sockets,tcp,udp,efa,mlx,shm
    - openmpi@4.1.4%gcc@12.2.0 fabrics=auto
    - hdf5@1.14.0%gcc@12.2.0 -mpi -tools
    - netcdf-c@4.9.2%gcc@12.2.0
    - netcdf-fortran@4.6.1%gcc@12.2.0
    - esmf@8.6.1%gcc@12.2.0 +mpi esmf_comm=openmpi esmf_pio=OFF ^openmpi@4.1.4%gcc@12.2.0
  concretizer:
    unify: true